services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    volumes:
      - ./backend/src:/usr/src/app/src
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: dev
    env_file:
      - ./.env
    environment:
      VITE_BACKEND_API_PROXY_URL: http://backend:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend/app/src:/usr/src/app/src
    ports:
      - "3000:5173"
    restart: unless-stopped
