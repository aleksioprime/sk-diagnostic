services:
  frontend:
    build:
      context: ./frontend
      target: dev
      args:
        - VITE_LOGGING=${VITE_LOGGING:-1}
        - VITE_API_URL=${VITE_API_URL:-https://flow.skeducator.ru}
    volumes:
      - ./frontend/app/src:/usr/src/app/src
    ports:
      - "3000:5173"
    restart: unless-stopped
