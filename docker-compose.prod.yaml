x-app: &app
  restart: unless-stopped

services:
  backend:
    image: ghcr.io/aleksioprime/sk-diagnostic-backend:${BACKEND_IMAGE_TAG:-latest}
    <<: *app
    container_name: sk-diagnostic-backend
    env_file:
      - ./.env
    networks:
      apps_net:
        aliases:
          - sk-diagnostic-backend

  frontend:
    image: ghcr.io/aleksioprime/sk-diagnostic-frontend:${FRONTEND_IMAGE_TAG:-latest}
    <<: *app
    container_name: sk-diagnostic-frontend
    depends_on:
      - backend
    networks:
      apps_net:
        aliases:
          - sk-diagnostic-frontend

networks:
  apps_net:
    external: true
