name: Build Diagnostic to GHCR

run-name: "Build and push Diagnostic images for ${{ github.ref_name }} by ${{ github.actor }}"

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'docker-compose.yaml'
      - 'docker-compose.prod.yaml'
      - '.github/workflows/build.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend/app

      - name: Build frontend
        run: npm run build
        working-directory: frontend/app
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://flow.skeducator.ru' }}
          VITE_BACKEND_API_URL: /backend

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Validate backend imports
        run: python -m compileall -q backend/src

  build:
    runs-on: ubuntu-latest
    needs: test
    env:
      BASE_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push frontend image
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://flow.skeducator.ru' }}
          VITE_LOGGING: ${{ vars.VITE_LOGGING || '0' }}
        run: |
          docker build \
            --target prod \
            --build-arg VITE_LOGGING="${VITE_LOGGING}" \
            --build-arg VITE_API_URL="${VITE_API_URL}" \
            --build-arg VITE_BACKEND_API_URL="/backend" \
            -t "${BASE_IMAGE}-frontend:latest" \
            -t "${BASE_IMAGE}-frontend:${GITHUB_SHA}" \
            ./frontend

          docker push "${BASE_IMAGE}-frontend:latest"
          docker push "${BASE_IMAGE}-frontend:${GITHUB_SHA}"

      - name: Build and push backend image
        run: |
          docker build \
            -t "${BASE_IMAGE}-backend:latest" \
            -t "${BASE_IMAGE}-backend:${GITHUB_SHA}" \
            ./backend

          docker push "${BASE_IMAGE}-backend:latest"
          docker push "${BASE_IMAGE}-backend:${GITHUB_SHA}"

      - name: Set image tags in Coolify
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          COOLIFY_API: ${{ secrets.COOLIFY_API }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP: ${{ secrets.COOLIFY_APP }}
          FRONTEND_IMAGE_TAG: ${{ github.sha }}
          BACKEND_IMAGE_TAG: ${{ github.sha }}
        run: |
          if [ -z "$COOLIFY_API" ] || [ -z "$COOLIFY_TOKEN" ] || [ -z "$COOLIFY_APP" ]; then
            echo "::warning::COOLIFY_API/COOLIFY_TOKEN/COOLIFY_APP not configured. Skipping image tag update."
            exit 0
          fi

          payload=$(cat <<JSON
          {
            "data": [
              { "key": "FRONTEND_IMAGE_TAG", "value": "${FRONTEND_IMAGE_TAG}" },
              { "key": "BACKEND_IMAGE_TAG", "value": "${BACKEND_IMAGE_TAG}" }
            ]
          }
          JSON
          )

          curl -sS -X PATCH \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Content-Type: application/json" \
            "$COOLIFY_API/applications/$COOLIFY_APP/envs/bulk" \
            -d "$payload" \
            || echo "::warning::Coolify image tag update failed"
